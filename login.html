<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema FET</title>
  <link rel="stylesheet" href="frontend/css/pages/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="frontend/js/config.js"></script>
  <script src="frontend/js/auth.js"></script>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="brand-box">
      <img src="frontend/assets/img/logo.png" alt="logo">
      <h1>Sistema FET</h1>
      <p>Control de inventario y préstamos deportivos</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="card">
      <h2>Iniciar sesión</h2>
      <p class="subtitle">Accede a tu panel administrativo</p>

      <!-- Formulario de login - se conectará al backend -->
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" name="email" required>
          <label>Correo institucional</label>
          <span class="focus-border"></span>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password" required>
          <label>Contraseña</label>
          <span class="focus-border"></span>
        </div>

        <div class="row">
          <label class="check">
            <input type="checkbox" name="remember">
            <span></span>
            Recordarme
          </label>
          <a href="#" class="link" id="forgotPasswordLink">Recuperar contraseña</a>
        </div>

        <button type="submit" class="btn-primary">Entrar al sistema</button>
      </form>

      <!-- Div para mostrar mensajes de error -->
      <div id="loginError" class="login-error" style="display: none;"></div>
    </div>
  </div>
</div>

</body>
</html>
